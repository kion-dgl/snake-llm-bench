<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 20px;
        }
        h1 { margin: 10px 0; }
        #score, #high { margin: 2px 0; font-size: 1.2rem; }
        canvas {
            background-color: #000;
            border: 2px solid #555;
            display: block;
        }
        .help {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Snake</h1>
    <div id="score">Score: 0</div>
    <div id="high">High: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="help">Arrow keys or WASD to move · Space to start/pause · R to restart</div>
    <script src="snake.js" defer></script>
</body>
</html>
