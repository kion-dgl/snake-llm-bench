<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake</title>
<style>
  html, body { margin: 0; padding: 0; background: #111; color: #eee; font-family: sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 8px; }
  h1 { margin: 0 0 8px 0; }
  #game { background: #000; border: 2px solid #444; display: block; image-rendering: pixelated; }
  .help { font-size: 14px; color: #aaa; margin-top: 8px; }
  .stat { font-size: 16px; }
</style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score" class="stat">Score: 0</div>
  <div id="high" class="stat">High: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="help">Arrow keys or WASD to move · Space to start/pause · R to restart</div>
  <script src="snake.js" defer></script>
</body>
</html>
