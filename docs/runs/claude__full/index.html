<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Snake</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111; color: #eee; font: 16px system-ui, sans-serif; }
    main { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
    #score { font-size: 20px; font-variant-numeric: tabular-nums; }
    canvas { background: #000; border: 1px solid #333; image-rendering: pixelated; touch-action: none; }
    .hint { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <div id="score">Score: 0</div>
    <canvas id="game" width="400" height="400" tabindex="0"></canvas>
    <div class="hint">Arrow keys or WASD · R to restart</div>
  </main>
  <script src="snake.js" defer></script>
</body>
</html>
