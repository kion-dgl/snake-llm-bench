<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    canvas {
      background: #000;
      border: 2px solid #fff;
      display: block;
      margin: 10px auto;
    }
    #score, #high, #help {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <div id="high">High: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <p id="help">Arrow keys or WASD to move · Space to start/pause · R to restart</p>
  <script src="snake.js" defer></script>
</body>
</html>
