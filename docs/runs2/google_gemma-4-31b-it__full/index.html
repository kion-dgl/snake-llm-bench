<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
        }
        h1 { margin-top: 0; }
        #game {
            background-color: #000;
            border: 2px solid #fff;
            display: block;
        }
        .help {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>Snake</h1>
    <div id="score">Score: 0</div>
    <div id="high">High: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="help">Arrow keys or WASD to move · Space to start/pause · R to restart</div>
    <script src="snake.js" defer></script>
</body>
</html>
